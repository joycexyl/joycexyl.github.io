<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Station Temperature Explorer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
      padding: 2rem;
      text-align: center;
      border-bottom: 1px solid #334155;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      margin-top: 0.5rem;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1.5rem 2rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      align-items: center;
    }

    .controls label { color: #94a3b8; font-size: 0.85rem; margin-right: 0.3rem; }

    .controls input[type=range] { accent-color: #38bdf8; }

    .controls input[type=text] {
      background: #0f172a;
      border: 1px solid #475569;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
      width: 200px;
    }

    .controls select {
      background: #0f172a;
      border: 1px solid #475569;
      color: #e2e8f0;
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 0.85rem;
    }

    .stat-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 2rem;
      justify-content: center;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1rem 1.5rem;
      text-align: center;
      min-width: 140px;
    }

    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #38bdf8;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.2rem;
    }

    .chart-container {
      padding: 1.5rem 2rem;
      overflow-x: auto;
    }

    .chart-wrap {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      min-width: 600px;
    }

    canvas { max-height: 500px; }

    .table-section {
      padding: 1.5rem 2rem;
    }

    .table-wrap {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead tr {
      background: #0f172a;
    }

    th {
      padding: 0.8rem 1rem;
      text-align: left;
      color: #94a3b8;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    th:hover { color: #38bdf8; }

    tbody tr {
      border-top: 1px solid #1e293b;
      transition: background 0.15s;
    }

    tbody tr:hover { background: #263348; }

    td { padding: 0.6rem 1rem; }

    .temp-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .bar-bg {
      flex: 1;
      height: 8px;
      background: #0f172a;
      border-radius: 4px;
      overflow: visible;
      position: relative;
      min-width: 80px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      position: absolute;
    }

    .cold { color: #60a5fa; }
    .warm { color: #f97316; }
    .hot  { color: #ef4444; }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: #475569;
      font-size: 0.8rem;
      border-top: 1px solid #1e293b;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.4rem; }
      .controls { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🌡️ Global Station Temperature Explorer</h1>
  <p>Interactive visualization of average temperatures across 413 weather stations worldwide — BST 236 Homework 3</p>
</header>

<div class="controls">
  <div>
    <label for="search">🔍 Search station:</label>
    <input type="text" id="search" placeholder="e.g. Tokyo, Paris…" oninput="applyFilters()" />
  </div>
  <div>
    <label for="sortBy">Sort by:</label>
    <select id="sortBy" onchange="applyFilters()">
      <option value="alpha">Alphabetical</option>
      <option value="temp_asc">Avg Temp ↑</option>
      <option value="temp_desc">Avg Temp ↓</option>
      <option value="range_desc">Range ↓</option>
    </select>
  </div>
  <div>
    <label>Show top: <span id="topNLabel">50</span></label>
    <input type="range" id="topN" min="10" max="413" step="10" value="50"
           oninput="document.getElementById('topNLabel').textContent=this.value; applyFilters()" />
  </div>
</div>

<div class="stat-row" id="statRow"></div>

<div class="chart-container">
  <div class="chart-wrap">
    <canvas id="tempChart"></canvas>
  </div>
</div>

<div class="table-section">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="toggleSort('name')">Station ⇅</th>
          <th onclick="toggleSort('avg')">Avg Temp (°C) ⇅</th>
          <th>Temperature Range</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<footer>
  Data generated via BST 236 Homework 3 · <a href="https://github.com/BST236-2025Spring" style="color:#38bdf8">GitHub</a>
</footer>

// Enrich with simulated std_dev ≈ 10 (from data generation)
const STD = 10;
const STATIONS = RAW.map(([name, avg]) => ({
  name,
  avg: +avg.toFixed(1),
  min: +(avg - 3 * STD / Math.sqrt(100)).toFixed(1),
  max: +(avg + 3 * STD / Math.sqrt(100)).toFixed(1),
  range: +(2 * 3 * STD / Math.sqrt(100)).toFixed(1)
}));

// Global state
let filtered = [...STATIONS];
let chartInstance = null;
let sortState = { col: null, asc: true };

function tempColor(t) {
  if (t < 5)  return '#60a5fa';
  if (t < 15) return '#34d399';
  if (t < 22) return '#facc15';
  if (t < 28) return '#f97316';
  return '#ef4444';
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sortBy').value;
  const n = +document.getElementById('topN').value;

  filtered = STATIONS.filter(s => s.name.toLowerCase().includes(q));

  if (sort === 'alpha')      filtered.sort((a,b) => a.name.localeCompare(b.name));
  if (sort === 'temp_asc')   filtered.sort((a,b) => a.avg - b.avg);
  if (sort === 'temp_desc')  filtered.sort((a,b) => b.avg - a.avg);
  if (sort === 'range_desc') filtered.sort((a,b) => b.range - a.range);

  const display = filtered.slice(0, n);
  updateStats(filtered);
  updateChart(display);
  updateTable(display);
}

function updateStats(data) {
  const avgs = data.map(s => s.avg);
  const hottest = data.reduce((a,b) => b.avg > a.avg ? b : a, data[0]);
  const coldest = data.reduce((a,b) => b.avg < a.avg ? b : a, data[0]);
  const mean = (avgs.reduce((a,b)=>a+b,0)/avgs.length).toFixed(1);

  document.getElementById('statRow').innerHTML = `
    <div class="stat-card"><div class="value hot">${hottest?.avg}°C</div><div class="label">🔥 Hottest avg<br>${hottest?.name}</div></div>
    <div class="stat-card"><div class="value cold">${coldest?.avg}°C</div><div class="label">❄️ Coldest avg<br>${coldest?.name}</div></div>
    <div class="stat-card"><div class="value">${mean}°C</div><div class="label">📊 Mean of displayed</div></div>
    <div class="stat-card"><div class="value">${data.length}</div><div class="label">📍 Stations shown</div></div>
  `;
}

function updateChart(data) {
  const ctx = document.getElementById('tempChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(s => s.name),
      datasets: [{
        label: 'Avg Temperature (°C)',
        data: data.map(s => s.avg),
        backgroundColor: data.map(s => tempColor(s.avg) + 'cc'),
        borderColor: data.map(s => tempColor(s.avg)),
        borderWidth: 1,
        borderRadius: 3
      }]
    },
    options: {
      responsive: true,
      animation: { duration: 400 },
      plugins: {
        legend: { labels: { color: '#e2e8f0' } },
        tooltip: {
          callbacks: {
            label: ctx => ` Avg: ${ctx.raw}°C`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#94a3b8', maxRotation: 60, font: { size: 10 } },
          grid:  { color: '#1e293b' }
        },
        y: {
          ticks: { color: '#94a3b8', callback: v => v + '°C' },
          grid:  { color: '#334155' },
          title: { display: true, text: 'Temperature (°C)', color: '#94a3b8' }
        }
      }
    }
  });
}

function updateTable(data) {
  const globalMin = Math.min(...STATIONS.map(s => s.avg));
  const globalMax = Math.max(...STATIONS.map(s => s.avg));
  const span = globalMax - globalMin;

  document.getElementById('tableBody').innerHTML = data.map(s => {
    const pct = ((s.avg - globalMin) / span * 100).toFixed(1);
    const cls = s.avg < 5 ? 'cold' : s.avg > 25 ? 'hot' : 'warm';
    return `
      <tr>
        <td>${s.name}</td>
        <td class="${cls}" style="font-weight:600">${s.avg}°C</td>
        <td>
          <div class="temp-bar">
            <div class="bar-bg">
              <div class="bar-fill" style="left:0;width:${pct}%;background:${tempColor(s.avg)}88"></div>
            </div>
            <span style="font-size:0.75rem;color:#64748b;white-space:nowrap">${s.avg}°C</span>
          </div>
        </td>
      </tr>`;
  }).join('');
}

function toggleSort(col) {
  if (sortState.col === col) sortState.asc = !sortState.asc;
  else { sortState.col = col; sortState.asc = true; }
  const sel = document.getElementById('sortBy');
  if (col === 'name') sel.value = 'alpha';
  if (col === 'avg')  sel.value = sortState.asc ? 'temp_asc' : 'temp_desc';
  applyFilters();
}

// Initialize
applyFilters();
</script>

</html>
